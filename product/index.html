<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара — МосПамять.рф</title>
    <meta name="description" content="Памятники из гранита и мрамора. Цена от производителя. Установка под ключ.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        :root {
            --gold: #C8A84B;
            --gold-light: #e0c26e;
            --gold-dark: #a8882e;
            --dark: #1a1a1a;
            --gray-bg: #f7f7f7;
            --border: #e5e5e5;
            --text: #333;
            --text-light: #777;
            --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--gray-bg);
            color: var(--text);
        }

        /* ===== СТРАНИЦА ===== */
        .product-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-light); font-size: 14px; text-decoration: none;
            margin-bottom: 24px; transition: color .2s;
        }
        .back-link:hover { color: var(--gold); }

        /* ===== КАРТОЧКА ===== */
        .product-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: #fff;
            border-radius: 16px;
            padding: 32px 36px;
            box-shadow: 0 2px 24px rgba(0,0,0,.06);
        }

        /* ===== ЛЕВАЯ КОЛОНКА: ФОТО ===== */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product-gallery .main-photo {
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1.1;
            position: relative;
        }
        .product-gallery .main-photo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 16px;
            transition: transform 0.3s ease;
        }
        .product-gallery .main-photo:hover img {
            transform: scale(1.02);
        }
        .product-gallery .main-photo .icon-placeholder {
            font-size: 120px;
            color: rgba(0,0,0,.06);
        }
        .product-gallery .badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--gold);
            color: var(--dark);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* Миниатюры */
        .product-gallery .thumbs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .product-gallery .thumbs .thumb {
            width: 70px;
            height: 70px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-light);
            cursor: pointer;
            transition: border-color 0.2s;
            overflow: hidden;
        }
        .product-gallery .thumbs .thumb:hover {
            border-color: var(--gold);
        }
        .product-gallery .thumbs .thumb.active {
            border-color: var(--gold);
            background: #fffbf0;
        }
        .product-gallery .thumbs .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== ПРАВАЯ КОЛОНКА: ИНФО ===== */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .product-info .sku {
            font-size: 13px;
            color: var(--text-light);
        }
        .product-info .sku span {
            font-weight: 600;
            color: var(--dark);
        }
        .product-info h1 {
            font-size: 28px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            line-height: 1.2;
        }

        /* Блок цены — с пометкой "от" */
        .product-info .price-block {
            background: var(--gray-bg);
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .product-info .price-block .price-label {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }
        .product-info .price-block .price {
            font-size: 32px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
        }
        .product-info .price-block .price span {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-light);
        }

        /* ===== ХАРАКТЕРИСТИКИ (только Размеры и Состав) ===== */
        .product-info .specs {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 2px 0;
        }
        .product-info .specs .spec-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .product-info .specs .spec-row:last-child {
            border-bottom: none;
        }
        .product-info .specs .spec-row .label {
            color: var(--text-light);
            font-weight: 500;
        }
        .product-info .specs .spec-row .value {
            font-weight: 600;
            color: var(--dark);
        }

        /* ===== КАРУСЕЛЬ МАТЕРИАЛОВ С ФОТО ===== */
        .materials-carousel {
            margin: 4px 0 6px;
        }
        .materials-carousel .carousel-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .materials-carousel .carousel-label i {
            color: var(--gold);
        }

        .materials-carousel .carousel-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fafafa;
        }
        .materials-carousel .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            gap: 4px;
            padding: 4px;
        }
        .materials-carousel .material-slide {
            flex: 0 0 calc(25% - 6px);
            min-width: 80px;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            cursor: default;
            transition: border-color 0.2s;
            position: relative;
        }
        .materials-carousel .material-slide:hover {
            border-color: var(--gold);
        }
        .materials-carousel .material-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 4px;
        }
        .materials-carousel .material-slide .material-name {
            position: absolute;
            bottom: 4px;
            left: 4px;
            right: 4px;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            line-height: 1.2;
            background: rgba(0,0,0,0.6);
            padding: 2px 4px;
            border-radius: 4px;
            word-break: break-word;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .materials-carousel .material-slide:hover .material-name {
            opacity: 1;
        }
        /* Заглушка если нет фото */
        .materials-carousel .material-slide .material-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .materials-carousel .material-slide .material-fallback .material-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            margin-bottom: 4px;
        }
        .materials-carousel .material-slide .material-fallback .material-icon {
            font-size: 24px;
            color: rgba(0,0,0,0.08);
        }
        .materials-carousel .material-slide .material-fallback .material-name-fallback {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
            margin-top: 2px;
        }

        .materials-carousel .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.5);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
            z-index: 2;
        }
        .materials-carousel .carousel-arrow:hover {
            background: rgba(0,0,0,0.7);
        }
        .materials-carousel .carousel-arrow-left {
            left: 6px;
        }
        .materials-carousel .carousel-arrow-right {
            right: 6px;
        }

        .materials-carousel .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
        }
        .materials-carousel .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: none;
            background: var(--border);
            cursor: pointer;
            transition: background 0.2s;
            padding: 0;
        }
        .materials-carousel .carousel-dot.active {
            background: var(--gold);
        }

        /* ===== ОПИСАНИЕ ===== */
        .product-info .description {
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            padding: 2px 0;
        }

        /* Пометка о финальной цене */
        .product-info .price-note {
            background: #fff8e7;
            border-left: 4px solid var(--gold);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
        .product-info .price-note i {
            color: var(--gold);
            margin-right: 8px;
        }

        /* Кнопки */
        .product-info .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn-primary {
            flex: 1;
            min-width: 180px;
            background: var(--gold);
            border: none;
            color: var(--dark);
            font-weight: 800;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
            padding: 14px 24px;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.15s;
            text-decoration: none;
        }
        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }
        .btn-messenger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 18px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
            min-width: 60px;
        }
        .btn-messenger:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }
        .btn-messenger img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .btn-tg  { background: #0088cc; color: #fff; }
        .btn-wa  { background: #25d366; color: #fff; }
        .btn-max { background: linear-gradient(135deg, #2a3aba, #9333d6); color: #fff; }

        /* ===== ПОХОЖИЕ ТОВАРЫ ===== */
        .similar-section {
            margin-top: 48px;
        }
        .similar-section h2 {
            font-size: 22px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            margin-bottom: 20px;
        }
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .similar-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .similar-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(0,0,0,.08);
        }
        .similar-item .img {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: rgba(0,0,0,.06);
            margin-bottom: 8px;
            overflow: hidden;
        }
        .similar-item .img img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .similar-item h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
        }
        .similar-item .price {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }
        .similar-item .price span {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-light);
        }

        /* ===== МОДАЛКА ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 18px;
            padding: 32px 28px;
            width: 100%;
            max-width: 460px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 12px 60px rgba(0,0,0,.25);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: none; opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border: none;
            background: var(--gray-bg);
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: var(--border); }
        .modal-box h3 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .modal-box > p {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 18px;
        }

        .order-summary-table {
            background: var(--gray-bg);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        .osl {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }
        .osl .k { color: var(--text-light); }
        .osl .v { font-weight: 600; text-align: right; max-width: 55%; }
        .osl.total-row {
            border-top: 1px solid var(--border);
            margin-top: 6px;
            padding-top: 8px;
        }
        .osl.total-row .k { font-weight: 800; color: var(--dark); }
        .osl.total-row .v { font-size: 16px; font-weight: 800; color: var(--gold-dark); }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #555;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .opd-block {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 12px 0;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .opd-block input {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: var(--gold);
            cursor: pointer;
        }
        .opd-block a {
            color: var(--gold);
            text-decoration: underline;
        }
        .opd-err {
            display: none;
            color: #d32f2f;
            font-size: 11px;
            font-weight: 700;
            margin-top: 4px;
        }

        .btn-submit {
            width: 100%;
            background: var(--gold);
            border: none;
            color: var(--dark);
            font-weight: 800;
            font-size: 15px;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: var(--gold-light); }

        .modal-success {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .modal-success i {
            font-size: 48px;
            color: #27ae60;
            margin-bottom: 12px;
            display: block;
        }
        .modal-success h4 { font-size: 18px; margin-bottom: 6px; }
        .modal-success p { font-size: 14px; color: var(--text-light); }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 900px) {
            .product-card {
                grid-template-columns: 1fr;
                padding: 24px;
                gap: 24px;
            }
            .product-gallery .main-photo {
                aspect-ratio: 4/3;
                max-height: 360px;
            }
            .product-info h1 { font-size: 24px; }
            .product-info .price-block .price { font-size: 28px; }
            .similar-grid { grid-template-columns: repeat(2, 1fr); }
            .materials-carousel .material-slide {
                flex: 0 0 calc(33.33% - 6px);
            }
        }

        @media (max-width: 600px) {
            .product-page { padding: 16px 12px 40px; }
            .product-card { padding: 16px; border-radius: 12px; }
            .product-info h1 { font-size: 20px; }
            .product-info .price-block .price { font-size: 24px; }
            .product-info .specs .spec-row {
                grid-template-columns: 1fr;
                gap: 2px;
                padding: 8px 12px;
            }
            .product-info .specs .spec-row .label { font-size: 12px; }
            .product-info .specs .spec-row .value { font-size: 14px; }
            .btn-primary {
                min-width: 140px;
                font-size: 14px;
                padding: 12px 18px;
            }
            .btn-messenger {
                padding: 12px 14px;
                font-size: 12px;
            }
            .similar-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .similar-item .img {
                height: 70px;
                font-size: 32px;
            }
            .similar-item h4 { font-size: 12px; }
            .similar-item .price { font-size: 14px; }
            .modal-box { padding: 24px 18px; }
            .materials-carousel .material-slide {
                flex: 0 0 calc(50% - 6px);
            }
        }

        @media (max-width: 400px) {
            .product-info .actions { flex-direction: column; }
            .btn-primary { width: 100%; min-width: 0; }
            .btn-messenger { flex: 1; }
            .similar-grid { grid-template-columns: 1fr; }
            .materials-carousel .material-slide {
                flex: 0 0 calc(50% - 6px);
            }
        }

        /* ===== ЗАГРУЗКА ===== */
        .loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }
        .loader i {
            font-size: 32px;
            color: var(--gold);
        }
        .loader p {
            margin-top: 16px;
            color: var(--text-light);
        }
        .not-found {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }
        .not-found h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
        }
        .not-found a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>

<header id="site-header"></header>

<section class="product-page">
    <a href="../catalog/" class="back-link">
        <i class="fas fa-arrow-left"></i> Назад в каталог
    </a>

    <div id="productCard" class="product-card">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Загрузка товара...</p>
        </div>
    </div>

    <div class="similar-section" id="similarSection" style="display:none;">
        <h2>Похожие товары</h2>
        <div class="similar-grid" id="similarGrid"></div>
    </div>
</section>

<footer id="site-footer"></footer>

<!-- МОДАЛКА ЗАКАЗА -->
<div class="modal-overlay" id="orderOverlay" onclick="closeModalOutside(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>

        <div id="modalFormView">
            <h3><i class="fas fa-shopping-cart" style="color:var(--gold);margin-right:8px;"></i>Оформление заказа</h3>
            <p>Заполните данные — менеджер свяжется с вами в течение 15 минут</p>

            <div class="order-summary-table">
                <div class="osl"><span class="k">Товар</span><span class="v" id="ms-product">—</span></div>
                <div class="osl"><span class="k">Цена</span><span class="v" id="ms-price">—</span></div>
                <div class="osl total-row"><span class="k">Итого</span><span class="v" id="ms-total">—</span></div>
            </div>

            <div class="form-group">
                <label>Ваше имя *</label>
                <input type="text" id="modalName" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Номер телефона *</label>
                <input type="tel" id="modalPhone" placeholder="+7 (___) ___-__-__">
            </div>

            <div class="opd-block">
                <input type="checkbox" id="modalOpd">
                <label for="modalOpd">
                    Нажимая кнопку, я даю согласие на
                    <a href="../privacy-policy.html" target="_blank" rel="noopener">обработку персональных данных</a>
                    в соответствии с&nbsp;ФЗ&#8209;152.
                </label>
            </div>
            <div class="opd-err" id="modalOpdErr"><i class="fas fa-exclamation-circle"></i> Необходимо согласие для отправки</div>

            <button class="btn-submit" onclick="submitOrder()">
                <i class="fas fa-paper-plane"></i> Отправить заказ
            </button>
        </div>

        <div class="modal-success" id="modalSuccess">
            <i class="fas fa-check-circle"></i>
            <h4>Заявка отправлена!</h4>
            <p>Менеджер свяжется с вами в течение 15 минут</p>
        </div>
    </div>
</div>

<script src="../js/header.js"></script>
<script src="../js/main.js"></script>
<script src="../js/validation.js"></script>
<script>
    (function() {
        'use strict';

        // ── Утилиты ──
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function fmt(n) {
            return Number(n || 0).toLocaleString('ru-RU');
        }

        function el(id) {
            return document.getElementById(id);
        }

        function setText(id, txt) {
            var e = el(id);
            if (e) e.textContent = txt;
        }

        // ── Категории для хлебных крошек ──
        var CAT_NAMES = {
            vertical: 'Вертикальные',
            horizontal: 'Горизонтальные',
            carved: 'Резные',
            double: 'Двойные',
            marble: 'Мраморные',
            fence: 'Ограды',
            socle: 'Цоколи',
            combined: 'Комбинированные',
            complex: 'Комплексы',
            accessories: 'Аксессуары'
        };

        // ── Загрузка ──
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var rawId = params.get('id');
            if (!rawId || !/^[\w\-]+$/.test(rawId)) {
                showNotFound('Не указан ID товара');
                return;
            }

            loadProducts(function(products) {
                var product = products.find(function(p) {
                    return String(p.id) === String(rawId) && !p.hidden;
                });
                if (!product) {
                    showNotFound('Товар не найден');
                    return;
                }
                document.title = product.name + ' — СонДуши.рф';
                renderProduct(product, products);
            });
        });

        function showNotFound(msg) {
            var card = el('productCard');
            if (card) {
                card.innerHTML =
                    '<div class="not-found">' +
                    '<h2>' + esc(msg) + '</h2>' +
                    '<p style="margin-top:12px;"><a href="../catalog/">Вернуться в каталог</a></p>' +
                    '</div>';
            }
            var sec = el('similarSection');
            if (sec) sec.style.display = 'none';
        }

        // ── ПОСТРОЕНИЕ ПУТИ К ФОТО ──
        function getPhotoUrl(product) {
            if (!product.photoURL) return null;

            if (product.photoURL.startsWith('http') || product.photoURL.startsWith('/')) {
                return product.photoURL;
            }

            if (product.photoURL.includes('products-img')) {
                return '../' + product.photoURL;
            }

            var path = product.photoURL;
            if (path.startsWith('img/products/')) {
                path = path.replace('img/products/', 'img/products-img/');
            }
            return '../' + path;
        }

        // ── ТРАНСЛИТЕРАЦИЯ ──
        function transliterate(text) {
            var map = {
                'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'e',
                'ж': 'zh', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm',
                'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u',
                'ф': 'f', 'х': 'h', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sch',
                'ъ': '', 'ы': 'y', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya',
                'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D', 'Е': 'E', 'Ё': 'E',
                'Ж': 'Zh', 'З': 'Z', 'И': 'I', 'Й': 'Y', 'К': 'K', 'Л': 'L', 'М': 'M',
                'Н': 'N', 'О': 'O', 'П': 'P', 'Р': 'R', 'С': 'S', 'Т': 'T', 'У': 'U',
                'Ф': 'F', 'Х': 'H', 'Ц': 'Ts', 'Ч': 'Ch', 'Ш': 'Sh', 'Щ': 'Sch',
                'Ъ': '', 'Ы': 'Y', 'Ь': '', 'Э': 'E', 'Ю': 'Yu', 'Я': 'Ya'
            };
            return text.split('').map(function(ch) {
                return map[ch] || ch;
            }).join('');
        }

        // ── ЦВЕТА ДЛЯ ЗАГЛУШКИ ──
        function getMaterialColor(name) {
            var colors = {
                'гранит': '#4a4a4a',
                'гранит габбро': '#2d2d2d',
                'гранит красный': '#8b3a3a',
                'гранит серый': '#7a7a7a',
                'мрамор': '#e8e0d0',
                'мрамор белый': '#f5f0e8',
                'мрамор чёрный': '#2a2a2a',
                'гранит полированный': '#3a3a3a',
                'гранит шлифованный': '#555555',
                'металл': '#888888',
                'металл с покраской': '#6a6a6a',
                'кованый металл': '#4a3a2a',
                'гранит + металл': '#5a5a5a',
            };
            var lower = name.toLowerCase();
            for (var key in colors) {
                if (lower.includes(key)) {
                    return colors[key];
                }
            }
            return '#999999';
        }

        function getMaterialIcon(name) {
            var lower = name.toLowerCase();
            if (lower.includes('гранит') || lower.includes('мрамор')) {
                return 'fa-mountain';
            }
            if (lower.includes('металл') || lower.includes('ковка')) {
                return 'fa-cubes';
            }
            return 'fa-cube';
        }

        // ── РЕНДЕР КАРУСЕЛИ МАТЕРИАЛОВ С ФОТО ──
        function renderMaterialsCarousel(materialNames) {
            var slidesHtml = materialNames.map(function(name, index) {
                var fileName = transliterate(name).toLowerCase().replace(/\s+/g, '-') + '.jpg';
                var imgPath = '../img/products-img/materials/' + fileName;
                var color = getMaterialColor(name);
                var icon = getMaterialIcon(name);

                return `
                    <div class="material-slide" data-index="${index}">
                        <img src="${imgPath}" alt="${esc(name)}" loading="lazy" 
                             onerror="this.style.display='none'; this.parentElement.querySelector('.material-fallback').style.display='flex'">
                        <div class="material-fallback" style="display:none;">
                            <div class="material-color" style="background-color: ${color};"></div>
                            <div class="material-icon"><i class="fas ${icon}"></i></div>
                            <div class="material-name-fallback">${esc(name)}</div>
                        </div>
                        <div class="material-name">${esc(name)}</div>
                    </div>
                `;
            }).join('');

            var arrowLeft = materialNames.length > 4 ? 
                '<button class="carousel-arrow carousel-arrow-left" onclick="slideMaterials(\'left\')"><i class="fas fa-chevron-left"></i></button>' : '';
            var arrowRight = materialNames.length > 4 ? 
                '<button class="carousel-arrow carousel-arrow-right" onclick="slideMaterials(\'right\')"><i class="fas fa-chevron-right"></i></button>' : '';

            return `
                <div class="materials-carousel" id="materialsCarousel">
                    <div class="carousel-label">
                        <i class="fas fa-cube"></i> Материалы
                    </div>
                    <div class="carousel-wrap">
                        ${arrowLeft}
                        <div class="carousel-track" id="materialsTrack">
                            ${slidesHtml}
                        </div>
                        ${arrowRight}
                    </div>
                    <div class="carousel-dots" id="materialsDots"></div>
                </div>
            `;
        }

        // ── Рендер ──
        function renderProduct(product, allProducts) {
            var card = el('productCard');
            if (!card) return;

            window._currentProduct = product;

            // Фото
            var photoUrl = getPhotoUrl(product);
            var photoHtml = '';
            if (photoUrl) {
                photoHtml = '<img src="' + photoUrl + '" alt="' + esc(product.name) + '" loading="lazy" onerror="this.style.display=\'none\'; this.parentNode.querySelector(\'.icon-placeholder\').style.display=\'flex\'" />' +
                    '<div class="icon-placeholder" style="display:none;"><i class="fas fa-' + esc(product.imageIcon || 'mountain') + '"></i></div>';
            } else {
                var icon = product.imageIcon || 'mountain';
                photoHtml = '<div class="icon-placeholder"><i class="fas fa-' + esc(icon) + '"></i></div>';
            }

            var badgeHtml = product.badge ? '<span class="badge">' + esc(product.badge) + '</span>' : '';

            var thumbsHtml = '';
            if (photoUrl) {
                thumbsHtml += '<div class="thumb active"><img src="' + photoUrl + '" alt="Фото 1" /></div>';
                thumbsHtml += '<div class="thumb"><i class="fas fa-camera"></i></div>';
                thumbsHtml += '<div class="thumb"><i class="fas fa-camera"></i></div>';
            } else {
                thumbsHtml += '<div class="thumb active"><i class="fas fa-camera"></i></div>';
                thumbsHtml += '<div class="thumb"><i class="fas fa-camera"></i></div>';
                thumbsHtml += '<div class="thumb"><i class="fas fa-camera"></i></div>';
            }

            // ── ХАРАКТЕРИСТИКИ (только Размеры и Состав) ──
            var specRows = [];

            if (product.sizes && product.sizes.length) {
                var sizeLabels = product.sizes.map(function(s) { return s.label; }).join(', ');
                specRows.push({ label: 'Размеры', value: sizeLabels });
            }

            var specsHtml = '';
            if (specRows.length) {
                specsHtml = '<div class="specs">' +
                    specRows.map(function(row) {
                        return '<div class="spec-row">' +
                            '<span class="label">' + esc(row.label) + '</span>' +
                            '<span class="value">' + esc(row.value) + '</span>' +
                            '</div>';
                    }).join('') +
                    '</div>';
            }

            // ── КАРУСЕЛЬ МАТЕРИАЛОВ ──
            var materialsCarouselHtml = '';
            var materialNames = [];
            if (product.materials && product.materials.length) {
                materialNames = product.materials.map(function(m) { return m.label; });
            }

            if (materialNames.length > 0) {
                materialsCarouselHtml = renderMaterialsCarousel(materialNames);
            }

            // Ссылки на мессенджеры
            var tgLink = 'https://t.me/PLACEHOLDER_TG';
            var waLink = 'https://wa.me/79362200900';
            var maxLink = 'https://max.ru/PLACEHOLDER_MAX';

            card.innerHTML =
                '<div class="product-gallery">' +
                '<div class="main-photo">' +
                photoHtml +
                badgeHtml +
                '</div>' +
                '<div class="thumbs">' +
                thumbsHtml +
                '</div>' +
                '</div>' +

                '<div class="product-info">' +
                '<div class="sku">Артикул: <span>' + esc(product.sku || 'SD-' + product.id) + '</span></div>' +
                '<h1>' + esc(product.name) + '</h1>' +

                '<div class="price-block">' +
                '<span class="price-label">от</span>' +
                '<span class="price">' + fmt(product.price) + ' <span>₽</span></span>' +
                '</div>' +

                specsHtml +

                materialsCarouselHtml +

                '<div class="description">' + esc(product.description || '') + '</div>' +

                '<div class="price-note">' +
                '<i class="fas fa-info-circle"></i> ' +
                'Окончательная стоимость памятника или всего комплекса будет определена после осмотра места установки и всех замеров.' +
                '</div>' +

                '<div class="actions">' +
                '<button class="btn-primary" onclick="openOrderModal()">' +
                '<i class="fas fa-shopping-cart"></i> Заказать' +
                '</button>' +
                '<a href="' + tgLink + '" target="_blank" rel="noopener" class="btn-messenger btn-tg" title="Telegram">' +
                '<i class="fab fa-telegram-plane"></i> TG' +
                '</a>' +
                '<a href="' + waLink + '" target="_blank" rel="noopener" class="btn-messenger btn-wa" title="WhatsApp">' +
                '<i class="fab fa-whatsapp"></i> WA' +
                '</a>' +
                '<a href="' + maxLink + '" target="_blank" rel="noopener" class="btn-messenger btn-max" title="Max">' +
                '<i class="fas fa-comment"></i> Max' +
                '</a>' +
                '</div>' +
                '</div>';

            renderSimilar(product, allProducts);

            setTimeout(function() {
                initMaterialsCarousel();
            }, 50);
        }

        // ── ИНИЦИАЛИЗАЦИЯ КАРУСЕЛИ ──
        var materialsCurrentSlide = 0;
        var materialsItemsPerView = 4;

        function initMaterialsCarousel() {
            var track = document.getElementById('materialsTrack');
            var dotsContainer = document.getElementById('materialsDots');
            if (!track || !dotsContainer) return;

            var items = track.querySelectorAll('.material-slide');
            var totalItems = items.length;
            if (totalItems === 0) return;

            updateMaterialsItemsPerView();

            var dotsCount = Math.ceil(totalItems / materialsItemsPerView);
            dotsContainer.innerHTML = '';
            for (var i = 0; i < dotsCount; i++) {
                var dot = document.createElement('button');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.dataset.index = i;
                dot.onclick = function() {
                    goToMaterialsSlide(parseInt(this.dataset.index));
                };
                dotsContainer.appendChild(dot);
            }

            materialsCurrentSlide = 0;
            updateMaterialsSlide();
        }

        function updateMaterialsItemsPerView() {
            var width = window.innerWidth;
            if (width <= 600) materialsItemsPerView = 2;
            else if (width <= 900) materialsItemsPerView = 3;
            else materialsItemsPerView = 4;
        }

        function updateMaterialsSlide() {
            var track = document.getElementById('materialsTrack');
            var dotsContainer = document.getElementById('materialsDots');
            if (!track) return;

            var items = track.querySelectorAll('.material-slide');
            var totalItems = items.length;
            if (totalItems === 0) return;

            var maxSlide = Math.ceil(totalItems / materialsItemsPerView) - 1;
            if (materialsCurrentSlide > maxSlide) materialsCurrentSlide = maxSlide;
            if (materialsCurrentSlide < 0) materialsCurrentSlide = 0;

            var slideWidth = 100 / materialsItemsPerView;
            var gap = 4;
            var trackWidth = track.parentElement.offsetWidth;
            var offset = -materialsCurrentSlide * (materialsItemsPerView * (slideWidth + (gap / trackWidth * 100)));
            track.style.transform = 'translateX(' + offset + '%)';

            if (dotsContainer) {
                var dots = dotsContainer.querySelectorAll('.carousel-dot');
                dots.forEach(function(dot, i) {
                    dot.classList.toggle('active', i === materialsCurrentSlide);
                });
            }
        }

        window.slideMaterials = function(direction) {
            var track = document.getElementById('materialsTrack');
            if (!track) return;

            var items = track.querySelectorAll('.material-slide');
            var totalItems = items.length;
            if (totalItems === 0) return;

            var maxSlide = Math.ceil(totalItems / materialsItemsPerView) - 1;

            if (direction === 'left') {
                materialsCurrentSlide = materialsCurrentSlide > 0 ? materialsCurrentSlide - 1 : maxSlide;
            } else {
                materialsCurrentSlide = materialsCurrentSlide < maxSlide ? materialsCurrentSlide + 1 : 0;
            }
            updateMaterialsSlide();
        };

        window.goToMaterialsSlide = function(index) {
            materialsCurrentSlide = index;
            updateMaterialsSlide();
        };

        var materialsResizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(materialsResizeTimeout);
            materialsResizeTimeout = setTimeout(function() {
                updateMaterialsItemsPerView();
                updateMaterialsSlide();
            }, 200);
        });

        // ── Похожие товары ──
        function renderSimilar(product, allProducts) {
            var section = el('similarSection');
            var grid = el('similarGrid');
            if (!section || !grid) return;

            if (!product.category || allProducts.length < 2) {
                section.style.display = 'none';
                return;
            }

            var similar = allProducts.filter(function(p) {
                return p.category === product.category && p.id !== product.id && !p.hidden;
            });

            if (similar.length < 4) {
                var popular = allProducts.filter(function(p) {
                    return p.id !== product.id && !p.hidden && !similar.includes(p);
                });
                popular.sort(function(a, b) {
                    return (b.popular ? 1 : 0) - (a.popular ? 1 : 0);
                });
                var needed = 4 - similar.length;
                similar = similar.concat(popular.slice(0, needed));
            }

            similar = similar.slice(0, 4);

            if (similar.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            grid.innerHTML = similar.map(function(p) {
                var imgHtml = '';
                var photoUrl = getPhotoUrl(p);
                if (photoUrl) {
                    imgHtml = '<img src="' + photoUrl + '" alt="' + esc(p.name) + '" loading="lazy" />';
                } else {
                    var icon = p.imageIcon || 'mountain';
                    imgHtml = '<i class="fas fa-' + esc(icon) + '"></i>';
                }
                return '<a href="../product/?id=' + p.id + '" class="similar-item">' +
                    '<div class="img">' + imgHtml + '</div>' +
                    '<h4>' + esc(p.name) + '</h4>' +
                    '<div class="price">' + fmt(p.price) + ' <span>₽</span></div>' +
                    '</a>';
            }).join('');
        }

        // ── МОДАЛКА ЗАКАЗА ──
        window.openOrderModal = function() {
            var product = window._currentProduct;
            if (!product) return;

            setText('ms-product', product.name);
            setText('ms-price', fmt(product.price) + ' ₽');
            setText('ms-total', fmt(product.price) + ' ₽');

            el('modalName').value = '';
            el('modalPhone').value = '';
            el('modalOpd').checked = false;
            el('modalOpdErr').style.display = 'none';
            el('modalFormView').style.display = 'block';
            el('modalSuccess').style.display = 'none';

            el('orderOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        };

        window.closeOrderModal = function() {
            el('orderOverlay').classList.remove('open');
            document.body.style.overflow = '';
        };

        window.closeModalOutside = function(e) {
            if (e.target === el('orderOverlay')) closeOrderModal();
        };

        window.submitOrder = function() {
            var name = (el('modalName')?.value || '').trim();
            var phone = (el('modalPhone')?.value || '').trim();
            var opd = el('modalOpd');
            var product = window._currentProduct;

            var ok = true;
            if (typeof validateForm === 'function') {
                ok = validateForm('modalName', 'modalPhone', null);
            } else {
                if (!name) ok = false;
                if (!phone || phone.replace(/\D/g, '').length < 11) ok = false;
            }

            if (!opd || !opd.checked) {
                el('modalOpdErr').style.display = 'block';
                ok = false;
            } else {
                el('modalOpdErr').style.display = 'none';
            }
            if (!ok) return;

            var msg = 'Заказ с сайта (карточка товара):\n\n' +
                'Товар: ' + (product ? product.name : '—') + '\n' +
                'Цена: ' + (product ? fmt(product.price) + ' ₽' : '—') + '\n\n' +
                'Клиент: ' + name + '\n' +
                'Телефон: ' + phone;

            fetch('https://formspree.io/f/mwvdpbap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    interest: product ? product.name : 'Товар с сайта',
                    comment: msg,
                    source: 'Карточка товара'
                })
            })
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function() {
                el('modalFormView').style.display = 'none';
                el('modalSuccess').style.display = 'block';
                setTimeout(closeOrderModal, 4000);
            })
            .catch(function() {
                alert('Ошибка отправки. Позвоните нам: +7 (936) 220-09-00');
            });
        };

    })();
</script>
